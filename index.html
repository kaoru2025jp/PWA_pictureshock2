<html>
<head>
<title>SOS</title>
</head>

<body>

<section>
<button type="button" onclick="myFunc()">→→→</button>
</section>

<section>
<img id="photo" src="images/photo1.png" width="300" onclick="change()">
</section>

 <section>
<h2>評価計算</h2>

<label>B (差し押さえ債権)</label>
<input id="B" type="number" value="100">

<label>S (交換銘柄評価)</label>
<input id="S" type="number" value="60">

<label>T (交渉バロメーター)</label>
<input id="T" type="number" value="10">

<label>V (市場期待値)</label>
<input id="V" type="number" value="100">

<label>r (割引率)</label>
<input id="r" type="number" value="0.05">

<label>X (期間)</label>
<input id="X" type="number" value="1">

<button onclick="calculate()">計算</button>

<p id="result"></p>
</section>

 
<script>
function myFunc(){
 var B = Number(prompt("B"));
 var S = Number(prompt("S"));
 var T = Number(prompt("T"));
 var O = (B-S)/T;
 alert(O);
}
</script>

<script>
const images = [
"images/photo1.png",
"images/photo2.png",
"images/photo3.png"
];

let num = 0;

function change(){
 num = (num + 1) % images.length;
 document.getElementById("photo").src = images[num];
}
</script>
<section>
<script>

let chart

function calculate(){

const B=parseFloat(document.getElementById("B").value)||0
const S=parseFloat(document.getElementById("S").value)||0
const T=parseFloat(document.getElementById("T").value)||1
const V=parseFloat(document.getElementById("V").value)||0
const r=parseFloat(document.getElementById("r").value)||0
const X=parseFloat(document.getElementById("X").value)||0


const negotiationCost=(B-S)/T

const M=(B*V-negotiationCost)/(V*Math.exp(-r*X))


document.getElementById("result").innerHTML=
"交渉コスト : "+negotiationCost.toFixed(2)
+"<br>債券評価価格 : "+M.toFixed(2)


</section>

</body>
</html>
